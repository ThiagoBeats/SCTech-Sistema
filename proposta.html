<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Proposta Comercial - SCTech</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #e8ecf0; display: block; overflow: auto; }
        .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; }
        .topbar-nav { font-size: 14px; color: #555; }
        .topbar-nav a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .topbar-actions { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="topbar no-print">
        <div class="topbar-nav">
            <a href="index.html">← Voltar ao Dashboard</a>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-outline" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
        </div>
    </div>

    <div class="proposta-wrapper">
        <div id="proposta-container">
            <p style="text-align:center; color: #999; padding: 40px 0;">Carregando proposta...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
