<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - SCTech</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="login-logo">
            <div class="logo-box">SC</div>
            <h1>SCTech</h1>
            <p>Sistema de Gestão</p>
        </div>
        <div class="form-group" style="margin-bottom:14px">
            <label>Usuário</label>
            <input type="text" id="login-usuario" placeholder="Digite seu usuário" autocomplete="username">
        </div>
        <div class="form-group" style="margin-bottom:14px">
            <label>Senha</label>
            <input type="password" id="login-senha" placeholder="Digite sua senha" autocomplete="current-password"
                   onkeydown="if(event.key==='Enter') realizarLogin()">
        </div>
        <div id="login-erro" class="login-erro" style="display:none"></div>
        <button class="btn" style="width:100%;padding:12px;font-size:15px;margin-top:4px" onclick="realizarLogin()">Entrar</button>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
