<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pedido de Compra - SCTech</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: white; display: block; padding: 30px; overflow: auto; }
        .pc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--primary); }
        .pc-section { margin-bottom: 20px; }
        .pc-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 10px; }
        .pc-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 0; }
        .pc-table th { background: #f8fafc; padding: 8px 10px; border-bottom: 2px solid var(--border); color: #555; text-align: left; }
        .pc-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
        .pc-table tfoot td { background: #f8fafc; }
        .pc-th { color: #666; font-weight: 600; background: #f8fafc; width: 130px; }
        .pc-assinaturas { display: flex; gap: 30px; margin-top: 50px; }
        .pc-assinaturas > div { flex: 1; text-align: center; }
        .pc-linha { border-bottom: 1px solid #555; height: 40px; margin: 8px 4px 4px; }
        .no-print { text-align: center; margin-top: 24px; }
        @media print {
            body { padding: 15px; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div style="max-width:900px;margin:0 auto">
        <div id="pedido-compra-container"></div>
        <div class="no-print">
            <button class="btn" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
            <button class="btn btn-outline" onclick="window.close()" style="margin-left:10px">Fechar</button>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
