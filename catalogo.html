<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - SCTech</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><div class="logo-box">SC</div><h2>SCTech</h2></div>
        <a href="index.html"    class="nav-item">📋 Dashboard</a>
        <a href="pcp.html"      class="nav-item">🏭 Produção (PCP)</a>
        <a href="estoque.html"  class="nav-item">📦 Estoque</a>
        <a href="clientes.html" class="nav-item">👥 Clientes</a>
        <a href="catalogo.html" class="nav-item active">📚 Catálogo</a>
        <a href="relatorios.html" class="nav-item">📊 Relatórios</a>
        <a href="vendedores.html" class="nav-item">👤 Vendedores</a>
        <a href="fornecedores.html" class="nav-item">🏭 Fornecedores</a>
        <div class="sidebar-footer">
            <div class="sidebar-user-info">
                <span class="sidebar-user-name" id="sidebar-user-name">—</span>
                <span class="sidebar-user-role">SCTech</span>
            </div>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </div>
    </aside>
    <main class="main">
        <div class="header"><h2>Catálogo e Preços</h2></div>
        <div class="card">
            <h3>Novo Tecido / Material</h3>
            <div class="grid" style="margin-top: 15px;">
                <div class="form-group">
                    <label>Nome do Tecido / Material</label>
                    <input type="text" id="cat-nome" placeholder="Ex: Linho Belga Importado">
                </div>
                <div class="form-group">
                    <label>Preço por Metro Linear (R$)</label>
                    <input type="number" id="cat-preco" placeholder="Ex: 85.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>Largura do Rolo (m) <span class="info-tag">padrão: 2.80</span></label>
                    <input type="number" id="cat-largura" placeholder="2.80" value="2.80" step="0.01">
                </div>
                <div class="form-group">
                    <label>Rapport / Repetição de Estampa (cm) <span class="info-tag">0 = liso</span></label>
                    <input type="number" id="cat-rapport" placeholder="0" value="0" step="1">
                </div>
                <div class="form-group">
                    <label>Estoque Mínimo (m) <span class="info-tag">0 = sem alerta</span></label>
                    <input type="number" id="cat-min" placeholder="0" value="0" step="0.5">
                </div>
                <div class="form-group">
                    <label>Fornecedor</label>
                    <select id="cat-fornecedor"><option value="">— Sem fornecedor —</option></select>
                </div>
            </div>
            <button class="btn" onclick="salvarCatalogo()">Salvar no Catálogo</button>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Preço (R$/m)</th>
                        <th>Largura do Rolo</th>
                        <th>Rapport</th>
                        <th>Estoque Mín.</th>
                        <th>Em Estoque</th>
                        <th>Fornecedor</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tb-catalogo"></tbody>
            </table>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
