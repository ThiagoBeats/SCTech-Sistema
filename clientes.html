<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Clientes - SCTech</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar" id="main-sidebar">
        <div class="logo"><div class="logo-box">SC</div><h2>SCTech</h2></div>
        <a href="index.html"    class="nav-item">📋 <span class="nav-text">Página Inicial</span></a>
        <a href="pcp.html"      class="nav-item">🏭 <span class="nav-text">Produção</span></a>
        <a href="estoque.html"  class="nav-item">📦 <span class="nav-text">Estoque</span></a>
        <a href="clientes.html" class="nav-item active">👥 <span class="nav-text">Clientes</span></a>
        <a href="catalogo.html" class="nav-item">📚 <span class="nav-text">Cadastro/Catálogo</span></a>
        <a href="relatorios.html" class="nav-item">📊 <span class="nav-text">Relatórios</span></a>
        <a href="vendedores.html" class="nav-item">👤 <span class="nav-text">Vendedores</span></a>
        <a href="fornecedores.html" class="nav-item">🏭 <span class="nav-text">Fornecedores</span></a>
        <a href="financeiro.html"   class="nav-item">💰 <span class="nav-text">Financeiro</span></a>
        <div class="sidebar-footer">
            <div class="sidebar-user-info">
                <span class="sidebar-user-name" id="sidebar-user-name">—</span>
                <span class="sidebar-user-role">SCTech</span>
            </div>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </div>
    </aside>
    <main class="main">
        <div class="header"><h2>Gestão de Clientes</h2></div>
        <div class="card">
            <h3 id="cli-form-titulo">Cadastrar Novo Cliente</h3>
            <div class="grid" style="margin-top: 15px;">
                <div class="form-group"><label>Nome Completo</label><input type="text" id="cli-nome"></div>
                <div class="form-group"><label>Telefone / WhatsApp</label><input type="text" id="cli-tel" placeholder="(11) 99999-9999"></div>
                <div class="form-group"><label>E-mail</label><input type="email" id="cli-email" placeholder="email@exemplo.com"></div>
                <div class="form-group"><label>CPF</label><input type="text" id="cli-cpf" placeholder="000.000.000-00"></div>
                <div class="form-group" style="grid-column:1/-1"><label>Endereço Completo</label><input type="text" id="cli-end" placeholder="Rua, número, bairro, cidade"></div>
            </div>
            <button class="btn" id="cli-btn-salvar" onclick="salvarCliente()">Salvar Cliente</button>
            <button class="btn btn-outline" id="cli-btn-cancelar" onclick="cancelarEdicaoCliente()" style="display:none;margin-left:8px">Cancelar Edição</button>
        </div>
        <div style="margin-bottom:12px;display:flex;gap:10px;align-items:center">
            <input type="text" id="cli-busca" placeholder="Buscar por nome, CPF, telefone ou e-mail…" oninput="filtrarTabelaClientes()" style="flex:1;padding:10px;border:1px solid #ccc;border-radius:4px;font-size:14px">
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Nome</th><th>Telefone</th><th>E-mail</th><th>CPF</th><th>Endereço</th><th>Ações</th></tr></thead>
                <tbody id="tb-clientes"></tbody>
            </table>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
