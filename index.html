<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SCTech</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><div class="logo-box">SC</div><h2>SCTech</h2></div>
        <a href="index.html"    class="nav-item active">📋 Dashboard</a>
        <a href="pcp.html"      class="nav-item">🏭 Produção (PCP)</a>
        <a href="estoque.html"  class="nav-item">📦 Estoque</a>
        <a href="clientes.html" class="nav-item">👥 Clientes</a>
        <a href="catalogo.html" class="nav-item">📚 Catálogo</a>
    </aside>
    <main class="main">
        <div class="header">
            <h2>Painel de Pedidos</h2>
            <a href="pedido.html" class="btn btn-success">+ Novo Pedido</a>
        </div>
        <div id="dashboard-alertas" class="dashboard-alertas"></div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">Faturamento do Mês</div>
                <div class="metric-value" id="met-fat-mes">—</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Em Produção</div>
                <div class="metric-value" id="met-producao">—</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Orçamentos Abertos</div>
                <div class="metric-value" id="met-orcamentos">—</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Ticket Médio</div>
                <div class="metric-value" id="met-ticket">—</div>
            </div>
            <div class="metric-card metric-card-alerta">
                <div class="metric-label">Estoque Crítico</div>
                <div class="metric-value" id="met-estoque-critico">—</div>
            </div>
            <div class="metric-card metric-card-alerta">
                <div class="metric-label">Entregas Atrasadas</div>
                <div class="metric-value" id="met-atrasados">—</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">A Receber (Total)</div>
                <div class="metric-value" id="met-a-receber">—</div>
            </div>
        </div>

        <div class="card">
            <div class="filter-bar">
                <input type="text" id="filtro-texto" placeholder="Buscar por ID, cliente ou ambiente…" oninput="renderDashboard()">
                <select id="filtro-status" onchange="renderDashboard()">
                    <option value="">Todos os status</option>
                    <option value="Orçamento">Orçamento</option>
                    <option value="Medição">Medição</option>
                    <option value="Aguardando Tecido">Aguardando Tecido</option>
                    <option value="Na Costura">Na Costura</option>
                    <option value="Pronto p/ Instalação">Pronto p/ Instalação</option>
                    <option value="Instalado">Instalado</option>
                </select>
                <span id="pedidos-counter" class="pedidos-counter"></span>
            </div>
            <table>
                <thead id="thead-pedidos"></thead>
                <tbody id="tb-pedidos"></tbody>
            </table>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
